<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skeletal System — Anatomy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <script src="../js/icons.js"></script>
</head>
<body>

<nav>
  <a href="../index.html" class="logo"><span data-icon="bone" data-icon-class="accent"></span> Anatomy</a>
  <span class="nav-title">Skeletal System</span>
  <a href="../index.html"><span data-icon="chevron" data-icon-class="dim"></span> Hub</a>
</nav>

<main class="container">
  <div class="breadcrumbs" id="breadcrumbs">
    <a href="../index.html">Hub</a>
    <span class="sep">›</span>
    <span class="current">Skeletal System</span>
  </div>

  <div class="browser-layout">
    <div class="browser-sidebar">
      <div class="search-bar">
        <span class="search-icon"><span data-icon="search" data-icon-class="dim"></span></span>
        <input type="search" id="bone-search" placeholder="Search bones… (press /)" autocomplete="off">
        <button class="search-clear" id="search-clear"><span data-icon="close" data-icon-class="dim"></span></button>
      </div>

      <div class="stats-bar" id="stats-bar">
        <span data-icon="bone" data-icon-class="dim"></span> bones ·
        <span data-icon="articulation" data-icon-class="dim"></span> articulations ·
        <span data-icon="ligament" data-icon-class="dim"></span> ligaments
      </div>

      <div class="filter-row">
        <span class="filter-chip" data-filter="long"><span data-icon="long" data-icon-class="dim"></span> Long bones</span>
        <span class="filter-chip" data-filter="flat"><span data-icon="flat" data-icon-class="dim"></span> Flat bones</span>
        <span class="filter-chip" data-filter="short"><span data-icon="short" data-icon-class="dim"></span> Short bones</span>
        <span class="filter-chip" data-filter="irregular"><span data-icon="irregular" data-icon-class="dim"></span> Irregular</span>
        <span class="filter-chip" data-filter="sesamoid"><span data-icon="sesamoid" data-icon-class="dim"></span> Sesamoid</span>
      </div>

      <div class="action-row">
        <button class="action-btn" id="random-bone-btn"><span data-icon="random" data-icon-class="dim"></span> Random</button>
        <button class="action-btn" onclick="App.state.activeFilter=null;document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));App._renderTree();App._renderWelcome();"><span data-icon="clear" data-icon-class="dim"></span> Clear</button>
      </div>

      <div class="progress-summary">
        <div class="progress-summary-header">
          <span class="progress-summary-label"><span data-icon="viewedEmpty" data-icon-class="dim"></span> Explored</span>
          <span class="progress-summary-num" id="progress-num">0 / 0</span>
        </div>
        <div class="progress-summary-bar">
          <div class="progress-summary-fill" id="progress-fill" style="width:0%"></div>
        </div>
      </div>

      <div id="region-tree-wrapper">
        <div class="region-tree" id="region-tree"></div>
      </div>

      <div class="kbd-hint">
        <span data-icon="arrowUp" data-icon-class="dim"></span>
        <span data-icon="arrowDown" data-icon-class="dim"></span> Navigate &nbsp;·&nbsp; <kbd>R</kbd> Random &nbsp;·&nbsp;
        <span data-icon="search" data-icon-class="dim"></span> Search
      </div>
    </div>

    <div class="browser-main">
      <div id="search-results" style="display:none;"></div>
      <div id="info-panel" class="info-panel"></div>
    </div>
  </div>
</main>

<div class="toast"></div>

<script>
// ─── Render data-icon placeholders ───
document.querySelectorAll('[data-icon]').forEach(el => {
  const name = el.getAttribute('data-icon');
  const cls = el.getAttribute('data-icon-class') || '';
  el.outerHTML = icon(name, cls);
});
</script>
<script src="../js/data.js"></script>
<script src="../js/app.js"></script>
<script>App.loadTopic('skeletal');</script>

</body>
</html>
