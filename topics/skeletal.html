<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skeletal System — Anatomy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<!-- Navigation -->
<nav>
  <a href="../index.html" class="logo"><span>🧬</span> Anatomy</a>
  <span class="nav-title">Skeletal System</span>
  <a href="../index.html">← Hub</a>
</nav>

<main class="container">
  <!-- Breadcrumbs -->
  <div class="breadcrumbs" id="breadcrumbs">
    <a href="../index.html">Hub</a>
    <span class="sep">›</span>
    <span class="current">Skeletal System</span>
  </div>

  <div class="browser-layout">
    <!-- ═══ SIDEBAR ═══ -->
    <div class="browser-sidebar">
      <!-- Search -->
      <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input type="search" id="bone-search" placeholder="Search bones… (press /)" autocomplete="off">
        <button class="search-clear" id="search-clear">✕</button>
      </div>

      <!-- Stats Bar -->
      <div class="stats-bar" id="stats-bar">🦴 — bones · 🫂 — articulations · 🔗 — ligaments</div>

      <!-- Filters -->
      <div class="filter-row">
        <span class="filter-chip" data-filter="long">📏 Long bones</span>
        <span class="filter-chip" data-filter="flat">🔲 Flat bones</span>
        <span class="filter-chip" data-filter="short">⚪ Short bones</span>
        <span class="filter-chip" data-filter="irregular">🌀 Irregular</span>
        <span class="filter-chip" data-filter="sesamoid">💎 Sesamoid</span>
      </div>

      <!-- Actions -->
      <div class="action-row">
        <button class="action-btn" id="random-bone-btn">🎲 Random</button>
        <button class="action-btn" onclick="App.state.activeFilter=null;document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));App._renderTree();App._renderWelcome();">✕ Clear</button>
      </div>

      <!-- Progress -->
      <div class="progress-summary">
        <div class="progress-summary-header">
          <span class="progress-summary-label">Explored</span>
          <span class="progress-summary-num" id="progress-num">0 / 0</span>
        </div>
        <div class="progress-summary-bar">
          <div class="progress-summary-fill" id="progress-fill" style="width:0%"></div>
        </div>
      </div>

      <!-- Region Tree -->
      <div id="region-tree-wrapper">
        <div class="region-tree" id="region-tree">
          <!-- Populated by JS -->
        </div>
      </div>

      <!-- Keyboard hint -->
      <div class="kbd-hint">
        <kbd>↑↓</kbd> Navigate &nbsp;·&nbsp; <kbd>R</kbd> Random &nbsp;·&nbsp; <kbd>/</kbd> Search
      </div>
    </div>

    <!-- ═══ MAIN AREA ═══ -->
    <div class="browser-main">
      <!-- Search results (overlay, hidden by default) -->
      <div id="search-results" style="display:none;"></div>

      <!-- Info Panel -->
      <div id="info-panel" class="info-panel">
        <!-- Populated by JS -->
      </div>
    </div>
  </div>
</main>

<!-- Toast container -->
<div class="toast"></div>

<script src="../js/data.js"></script>
<script src="../js/app.js"></script>
<script>App.loadTopic('skeletal');</script>

</body>
</html>
